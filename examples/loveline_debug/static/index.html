<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loveline Concordia Debug</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d7dee8;
      --panel: #f8fafc;
      --accent: #0f766e;
      --warn: #a16207;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: white;
    }
    header {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    h1 { font-size: 18px; margin: 0; }
    h2 { font-size: 15px; margin: 0 0 10px; }
    h3 { font-size: 14px; margin: 0; }
    main {
      height: calc(100vh - 58px);
      display: grid;
      grid-template-columns: 240px minmax(540px, 1fr) 360px;
      overflow: hidden;
    }
    section {
      padding: 14px;
      overflow: auto;
      border-right: 1px solid var(--line);
    }
    section:last-child { border-right: 0; }
    .band {
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      margin-bottom: 12px;
    }
    label, .field-label {
      display: block;
      font-weight: 650;
      margin: 10px 0 5px;
    }
    select, input, textarea, button { font: inherit; }
    select, input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 7px 8px;
      background: white;
      color: var(--ink);
    }
    textarea {
      min-height: 96px;
      resize: vertical;
      font-family: inherit;
      font-size: 13px;
    }
    textarea.tall { min-height: 220px; }
    .json-box, #snapshotJson, #contestantsJson, #scenesJson, #configRawJson {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .row, .block-title, .checkbox-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .row > * { flex: 1; }
    .block-title { justify-content: space-between; margin-bottom: 8px; }
    .checkbox-row { flex-wrap: wrap; margin-bottom: 8px; }
    button {
      border: 1px solid #0f766e;
      background: var(--accent);
      color: white;
      border-radius: 5px;
      padding: 7px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary {
      color: var(--ink);
      background: white;
      border-color: var(--line);
    }
    button.warn { background: var(--warn); border-color: var(--warn); }
    button.small { padding: 4px 8px; font-size: 12px; }
    .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .tabs button { background: white; color: var(--ink); border-color: var(--line); }
    .tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
    .pill {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      margin: 2px 4px 2px 0;
      font-size: 12px;
      background: white;
    }
    .status {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 10px;
      min-height: 140px;
    }
    .editor-block {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fff;
    }
    .editor-block.compact { background: var(--panel); }
    .grid { display: grid; gap: 10px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.type-grid { grid-template-columns: minmax(0, 1fr) 110px; }
    .grid.scene-grid { grid-template-columns: minmax(0, 1fr) 160px 130px; }
    .checkline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      margin: 4px 10px 4px 0;
    }
    .checkline input { width: auto; }
    details { margin-top: 10px; }
    summary { cursor: pointer; color: var(--accent); font-weight: 650; }
    .error { color: var(--bad); font-weight: 650; }
    .muted { color: var(--muted); overflow-wrap: anywhere; }
    ul { padding-left: 18px; }
    a { color: #0f766e; }
    @media (max-width: 1050px) {
      main { grid-template-columns: 1fr; height: auto; overflow: visible; }
      section { border-right: 0; border-bottom: 1px solid var(--line); }
      .grid.two, .grid.scene-grid, .grid.type-grid { grid-template-columns: 1fr; }
      header { align-items: stretch; flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Loveline Concordia Debug</h1>
    <div class="row" style="max-width: 520px">
      <input id="draftName" value="two_candidate_debug" aria-label="Draft name">
      <button id="saveDraft">Save Draft</button>
      <button id="runDraft" class="warn">Run</button>
    </div>
  </header>
  <main>
    <section>
      <div class="band">
        <h2>Source</h2>
        <div id="sourceRoot" class="muted"></div>
      </div>
      <div class="band">
        <h2>Saved Draft</h2>
        <label for="loadDraft">Draft</label>
        <div class="row">
          <select id="loadDraft"></select>
          <button id="loadDraftBtn" class="secondary">Load</button>
        </div>
      </div>
      <div class="band">
        <h2>Selected Pair</h2>
        <div id="candidateTags"></div>
      </div>
    </section>
    <section>
      <div class="tabs">
        <button data-tab="config" class="active">Config</button>
        <button data-tab="candidates">Candidates</button>
        <button data-tab="scenes">Scenes</button>
        <button data-tab="snapshot">Snapshot</button>
      </div>

      <div data-tab-panel="config" id="tabConfig">
        <div class="editor-block">
          <div class="block-title"><h2>Draft Metadata</h2></div>
          <div class="grid two">
            <label>Schema Version<input id="schemaVersion" type="number" min="1"></label>
            <label>Source Root<input id="sourceRootInput"></label>
            <label>Created At<input id="createdAt"></label>
            <label>Updated At<input id="updatedAt"></label>
          </div>
        </div>
        <div class="editor-block">
          <div class="block-title"><h2>Pair Selection</h2><button id="applySelection" class="secondary">Apply Pair</button></div>
          <div class="grid two">
            <label>Male Candidate<select id="maleCandidate"></select></label>
            <label>Female Candidate<select id="femaleCandidate"></select></label>
          </div>
        </div>
        <div class="editor-block">
          <div class="block-title"><h2>Run Settings</h2></div>
          <div class="grid two">
            <label>Max Steps<input id="maxSteps" type="number" min="1" max="100"></label>
            <label>API Type<input id="apiType"></label>
            <label>Model<input id="modelName"></label>
            <label class="checkline"><input id="disableLm" type="checkbox"> Disable language model</label>
            <label class="checkline"><input id="checkpointEveryStep" type="checkbox"> Checkpoint every step</label>
          </div>
        </div>
        <div class="editor-block">
          <div class="block-title"><h2>Scene Defaults</h2></div>
          <label>Main Game Master<input id="mainGameMasterName"></label>
          <label>Default Premise<textarea id="defaultPremise"></textarea></label>
        </div>
        <details>
          <summary>Config JSON</summary>
          <button id="applyConfigJson" class="secondary small" type="button">Apply JSON</button>
          <textarea id="configRawJson"></textarea>
        </details>
      </div>

      <div data-tab-panel="candidates" id="tabCandidates" style="display:none">
        <div id="candidateEditor"></div>
        <details>
          <summary>All candidates JSON</summary>
          <button id="applyContestantsJson" class="secondary small" type="button">Apply JSON</button>
          <textarea id="contestantsJson"></textarea>
        </details>
      </div>

      <div data-tab-panel="scenes" id="tabScenes" style="display:none">
        <div class="editor-block">
          <div class="block-title"><h2>Scene Defaults</h2></div>
          <label>Main Game Master<input id="sceneDefaultsMainGameMaster"></label>
          <label>Default Premise<textarea id="sceneDefaultsPremise"></textarea></label>
        </div>
        <div class="block-title"><h2>Scene Types</h2><button id="addSceneType" class="secondary small">Add Type</button></div>
        <div id="sceneTypeEditor"></div>
        <div class="block-title"><h2>Scene List</h2><button id="addScene" class="secondary small">Add Scene</button></div>
        <div id="sceneListEditor"></div>
        <details>
          <summary>Scenes payload JSON</summary>
          <button id="applyScenesJson" class="secondary small" type="button">Apply JSON</button>
          <textarea id="scenesJson"></textarea>
        </details>
      </div>

      <div data-tab-panel="snapshot" id="tabSnapshot" style="display:none">
        <h2>Full Draft Snapshot</h2>
        <textarea id="snapshotJson"></textarea>
      </div>
    </section>
    <section>
      <div class="band">
        <h2>Run Control</h2>
        <div class="row">
          <button data-command="play" class="secondary">Play</button>
          <button data-command="pause" class="secondary">Pause</button>
          <button data-command="step" class="secondary">Step</button>
          <button data-command="stop" class="secondary">Stop</button>
        </div>
      </div>
      <div class="band">
        <h2>Status</h2>
        <div id="message" class="muted"></div>
        <pre id="status" class="status"></pre>
      </div>
      <div class="band">
        <h2>Recent Runs</h2>
        <ul id="recentRuns"></ul>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
